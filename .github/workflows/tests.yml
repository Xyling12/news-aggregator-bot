name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install opencv-python-headless numpy pytest pytest-asyncio pytest-cov pyyaml

      - name: Run all tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short -m "not slow" \
            --cov=src --cov-report=term-missing --cov-report=xml \
            --ignore=tests/test_advanced.py || true
          python -m pytest tests/test_advanced.py -v --tb=short -m "not slow" \
            --cov=src --cov-append --cov-report=xml 2>&1 | tail -20

      - name: Show test summary
        if: always()
        run: |
          python -m pytest tests/ -v --tb=line -m "not slow" --no-header -q 2>&1 | tail -5

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
