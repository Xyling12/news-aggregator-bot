version: '3.8'

services:
  news-bot:
    image: ghcr.io/xyling12/news-aggregator-bot:main
    pull_policy: always
    container_name: news-bot
    restart: unless-stopped
    volumes:
      - bot_data:/app/data
      - bot_media:/app/media
    env_file:
      - .env
    environment:
      - AUTO_PUBLISH=true
      - PUBLISH_INTERVAL=900
    healthcheck:
      test: ["CMD", "python", "-c", "import os; open('/app/data/bot.db')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  bot_data:
  bot_media:
