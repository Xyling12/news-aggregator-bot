version: '3.8'

services:
  news-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-bot
    restart: unless-stopped
    volumes:
      - bot_data:/app/data
      - bot_media:/app/media
    env_file:
      - .env
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  bot_data:
  bot_media:
