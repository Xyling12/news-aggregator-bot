version: '3.8'

services:
  news-bot:
    image: ghcr.io/xyling12/news-aggregator-bot:main
    pull_policy: always
    container_name: news-bot
    restart: unless-stopped
    volumes:
      - bot_data:/app/data
      - bot_media:/app/media
    env_file:
      - .env
    environment:
      - AUTO_PUBLISH=true
      - PUBLISH_INTERVAL=900
      - VK_GROUP_ID=236380336
      - AITUNNEL_API_KEY=sk-aitunnel-GEhq2XTu9QmIrrOZe2S1Di2WAdp7yQ0C
      - AITUNNEL_MODEL=gpt-4o-mini
      - PEXELS_API_KEY=I71vTtRmVcODHWvBFyXjviye6s7c0WdrOIILXo3O4iXiArXCuVLONb5l
      - VK_USER_TOKEN=vk1.a.B7tY58v8viQM67U3El-xOWTPT03q1_BRLDD4rWZ7CWkoN1fDlX_2xZ60MhhoO3lirTXEgHBx_WzzqPfe3PK99Rj7tyLSIETBLnUR3_KVn0GOvYvqJquiFwkq8t4tAnQbmIIuwo-Kv01Sf2ZW8z4kOWnDN0EB5dsXOZBRlUElZrWRdgF7Wob5cOgn_NnDJu0tG4bDKjTuG8X_Mq36sKksUg
    healthcheck:
      test: [ "CMD", "python", "-c", "import os; open('/app/data/bot.db')" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network

  # ── VK контент-бот для vk.com/grandtransfer (межгород тематика) ──────────
  grandtransfer-bot:
    image: ghcr.io/xyling12/news-aggregator-bot:main
    pull_policy: always
    container_name: grandtransfer-bot
    restart: unless-stopped
    command: python grandtransfer_main.py
    volumes:
      - gt_data:/app/data
      - gt_media:/app/media
    environment:
      # VK токен группы grandtransfer (отдельный от Ижевска)
      - VK_ACCESS_TOKEN_GT=vk1.a.GzoxUOdyMSMZ48ihLborDA3JAefqzqF4lf218S8rwGIbvu94Z8qnxztrHPgHlYAeE0kdXNMqJFWIiksBXAFitRE1aqL7fo5fjikH3ph2HdqOTs8a39LGws50TcNdrRJYzfnHi9zpfQ9bmWYK7NilZrGPMj-ZCWugK0_nYg1xbWDE0maM2jqA6fCOrTTd3gtczLwbiWu8_-IoQz48L0yrJA
      - VK_GROUP_ID_GT=218903564
      - AITUNNEL_API_KEY=sk-aitunnel-GEhq2XTu9QmIrrOZe2S1Di2WAdp7yQ0C
      - AITUNNEL_MODEL=gpt-4o-mini
      - PEXELS_API_KEY=I71vTtRmVcODHWvBFyXjviye6s7c0WdrOIILXo3O4iXiArXCuVLONb5l
